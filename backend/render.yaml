# Render Blueprint for SnapAlign Backend
services:
  - type: web
    name: snapalign-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # You'll set this manually
      - key: DB_NAME
        value: snapalign
      - key: ADMIN_PASSWORD
        value: snapalign2026
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
